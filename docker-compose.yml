services:
  db:
    image: postgres:16-alpine
    container_name: quiniela_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quiniela}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quiniela_secret}
      POSTGRES_DB: ${POSTGRES_DB:-quiniela}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quiniela} -d ${POSTGRES_DB:-quiniela}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - quiniela_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quiniela_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-quiniela}:${POSTGRES_PASSWORD:-quiniela_secret}@db:5432/${POSTGRES_DB:-quiniela}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - quiniela_net

volumes:
  postgres_data:

networks:
  quiniela_net:
    driver: bridge
